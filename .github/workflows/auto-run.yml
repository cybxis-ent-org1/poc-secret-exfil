name: Extract Secrets
on:
  push:
  workflow_dispatch:
permissions:
  contents: read
  actions: read
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Check token permissions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check what the token can actually access
          echo "--- All org repos ---"
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/orgs/cybxis-ent-org1/repos?per_page=100" | jq -c '[.[].name]'

          echo "--- Token scopes ---"
          curl -sI -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/cybxis-ent-org1/poc-secret-exfil" | grep -i x-oauth

          echo "--- Installation repos ---"
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/installation/repositories?per_page=100" | jq -c '[.repositories[].full_name]'
